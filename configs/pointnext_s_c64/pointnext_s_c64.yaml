# PointNeXt-S/C64 configuration for ModelNet40.
# Paths are relative to the project root unless an absolute path is provided.

# Dataset root. Current project stores only the training split directly as
# modelnet40_normal_resampled/<class_name>/*.txt.
data_root: modelnet40_train_data/modelnet40_normal_resampled

# Label file, one class name per line.
labels: labels/modelnet40.txt

# Output directory for checkpoints and training history.
# Keep the first-round run in runs/pointnext_s_c64_normals; retrain this
# optimized baseline into a new directory.
model_name: pointnext_s_c64_base_v2
out_dir: runs/pointnext_s_c64_base_v2

# Model variant. Use "s" first; RTX 4090 24GB can also try "b" for higher capacity.
variant: s

# Channel width. 64 means PointNeXt-S/C64. RTX 4090 24GB keeps 64 as the
# accuracy/speed balance; try 96 only with variant "b" or smaller batch_size.
width: 64

# kNN neighborhood size for local grouping. 32 is the standard safe default.
nsample: 32

# Number of sampled points per object. 1024 is the ModelNet40 benchmark default.
# RTX 4090 24GB can try 2048 with batch_size 32-64 if chasing extra accuracy.
num_points: 1024

# Use normals nx,ny,nz in addition to xyz. Keep true for this dataset.
use_normals: true

# Random Y-axis rotation augmentation. Disabled by default because PointNeXt
# ModelNet40 configs often avoid rotation for aligned objects.
random_rotate: false

# Training epochs. Early stopping below selects the best validation-class
# checkpoint, so this can stay long enough for late improvements.
epochs: 700

# Batch size. Tuned for RTX 4090 24GB @ 1024 points (~9GB peak at batch 128).
# Reduce to 64 if unstable; OOM only likely above 224.
batch_size: 128

# AdamW learning rate. Slightly lower than the first round to reduce validation
# oscillation while keeping the large RTX 4090 batch.
lr: 0.0015

# AdamW weight decay. 0.05 follows PointNeXt/OpenPoints-style settings.
weight_decay: 0.05

# Label smoothing for better generalization. Reduced from 0.2 to leave more
# class-discriminative signal for the minority classes.
label_smoothing: 0.1

# Validation split ratio from the training set. Used because no independent
# test split is currently available.
val_ratio: 0.15

# DataLoader workers. Linux + CUDA: 8 is a good default on AutoDL; use 0 on Windows.
num_workers: 8

# Random seed for reproducible train/validation split and initialization.
seed: 42

# Enable GPU acceleration when CUDA is unavailable, the code falls back to CPU.
use_gpu: true

# Class-balanced loss. The training set is highly imbalanced; a mild exponent
# helps Class Accuracy without over-penalizing frequent classes.
use_class_weights: true
class_weight_power: 0.25

# Warmup + early stopping. Monitor mean class accuracy because the target
# includes Class Accuracy >= 90%.
augment_strength: normal
warmup_epochs: 10
early_stop_patience: 150
early_stop_min_delta: 0.0005
early_stop_metric: val_class_acc

resume_checkpoint: null

# --- Prediction (python -m src.pointnext_demo.predict --config ...) ---
# Test set root; structure: <test_data_root>/test/<class>/*.txt
test_data_root: modelnet40_test_data/modelnet40_normal_resampled
test_split: test

# Checkpoint for inference. If omitted, defaults to <out_dir>/best.pt
checkpoint: runs/pointnext_s_c64_base_v2/best.pt

# Submission CSV: column1=id, column2=class name, comma-separated, no header
out_csv: runs/pointnext_s_c64_base_v2/test_predictions_base_v2.csv

# No-rotation baseline: keep voting at 1. The first-round experiments showed
# random rotation voting hurts aligned ModelNet40-style objects.
votes: 1

# Inference-only point count (can differ from training num_points without retraining).
predict_num_points: 2048

# Inference batch size (2048 points needs less than training batch_size on GPU).
predict_batch_size: 64

# Print Test Instance / Class Accuracy when test folders include class labels.
eval_on_test: true
