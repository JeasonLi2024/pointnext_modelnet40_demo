# PointNeXt-B/C64 no-rotation — Stage 1 (optimize for Class Accuracy >= 90%).
# Based on the proven 1024-point pipeline; stronger class-balanced loss than default.
# Output: runs/pointnext_b_c64_no_rotate_class90_stage1

model_name: pointnext_b_c64_no_rotate_class90_stage1

data_root: modelnet40_train_data/modelnet40_normal_resampled
labels: labels/modelnet40.txt
out_dir: runs/pointnext_b_c64_no_rotate_class90_stage1

variant: b
width: 64
nsample: 32
num_points: 1024
use_normals: true

random_rotate: false
augment_strength: normal

epochs: 700
batch_size: 48
lr: 0.001
weight_decay: 0.05
label_smoothing: 0.05

val_ratio: 0.15
num_workers: 8
seed: 44
use_gpu: true

use_class_weights: true
class_weight_power: 0.5

warmup_epochs: 20
early_stop_patience: 150
early_stop_min_delta: 0.001
early_stop_metric: val_class_acc

resume_checkpoint: null

test_data_root: modelnet40_test_data/modelnet40_normal_resampled
test_split: test
checkpoint: runs/pointnext_b_c64_no_rotate_class90_stage2/best.pt
out_csv: runs/pointnext_b_c64_no_rotate_class90_stage2/test_predictions_class90.csv
votes: 1
predict_num_points: 2048
predict_batch_size: 32
eval_on_test: true
