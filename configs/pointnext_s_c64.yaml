# PointNeXt-S/C64 configuration for ModelNet40.
# Paths are relative to the project root unless an absolute path is provided.

# Dataset root. Current project stores only the training split directly as
# modelnet40_normal_resampled/<class_name>/*.txt.
data_root: modelnet40_train_data/modelnet40_normal_resampled

# Label file, one class name per line.
labels: labels/modelnet40.txt

# Output directory for checkpoints and training history.
out_dir: runs/pointnext_s_c64_normals

# Model variant. Use "s" first; RTX 4090 24GB can also try "b" for higher capacity.
variant: s

# Channel width. 64 means PointNeXt-S/C64. RTX 4090 24GB keeps 64 as the
# accuracy/speed balance; try 96 only with variant "b" or smaller batch_size.
width: 64

# kNN neighborhood size for local grouping. 32 is the standard safe default.
nsample: 32

# Number of sampled points per object. 1024 is the ModelNet40 benchmark default.
# RTX 4090 24GB can try 2048 with batch_size 32-64 if chasing extra accuracy.
num_points: 1024

# Use normals nx,ny,nz in addition to xyz. Keep true for this dataset.
use_normals: true

# Random Y-axis rotation augmentation. Disabled by default because PointNeXt
# ModelNet40 configs often avoid rotation for aligned objects.
random_rotate: false

# Training epochs. Increase if validation metrics are still improving.
epochs: 600

# Batch size. Tuned for RTX 4090 24GB @ 1024 points (~9GB peak at batch 128).
# Reduce to 64 if unstable; OOM only likely above 224.
batch_size: 128

# AdamW learning rate. Scaled with sqrt(batch/16) from base 0.001; cap 0.002.
lr: 0.002

# AdamW weight decay. 0.05 follows PointNeXt/OpenPoints-style settings.
weight_decay: 0.05

# Label smoothing for better generalization. Typical range: 0.1-0.2.
label_smoothing: 0.2

# Validation split ratio from the training set. Used because no independent
# test split is currently available.
val_ratio: 0.15

# DataLoader workers. Linux + CUDA: 8 is a good default on AutoDL; use 0 on Windows.
num_workers: 8

# Random seed for reproducible train/validation split and initialization.
seed: 42

# Enable GPU acceleration when CUDA is available. If CUDA is unavailable, the
# code falls back to CPU automatically.
use_gpu: true
