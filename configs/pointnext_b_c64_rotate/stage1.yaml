# PointNeXt-B/C64 rotation-augmented model - Stage 1.
# This is an explicit robustness branch. Use it only if its validation/test
# results beat the no-rotation branch.

model_name: pointnext_b_c64_rotate_stage1

data_root: modelnet40_train_data/modelnet40_normal_resampled
labels: labels/modelnet40.txt
out_dir: runs/pointnext_b_c64_rotate_stage1

variant: b
width: 64
nsample: 32
num_points: 1024
use_normals: true

random_rotate: true
augment_strength: normal

epochs: 700
batch_size: 48
lr: 0.001
weight_decay: 0.05
label_smoothing: 0.1

val_ratio: 0.15
num_workers: 8
seed: 42
use_gpu: true

use_class_weights: true
class_weight_power: 0.25

warmup_epochs: 20
early_stop_patience: 150
early_stop_min_delta: 0.0005
early_stop_metric: val_class_acc

resume_checkpoint: null

# --- Prediction defaults after stage 2 finishes ---
test_data_root: modelnet40_test_data/modelnet40_normal_resampled
test_split: test
checkpoint: runs/pointnext_b_c64_rotate_stage2/best.pt
out_csv: runs/pointnext_b_c64_rotate_stage2/赛道1-李文睿2023210965-王俊涛2023210952-孙奥翔2023210958.csv
votes: 3
predict_num_points: 2048
predict_batch_size: 32
eval_on_test: true
