# PointNeXt-B/C96 no-rotation model - Stage 1.
# Higher-capacity fallback. Train this only after B/C64 no-rotation if GPU time
# allows; reduce batch_size if CUDA runs out of memory.

model_name: pointnext_b_c96_no_rotate_stage1

data_root: modelnet40_train_data/modelnet40_normal_resampled
labels: labels/modelnet40.txt
out_dir: runs/pointnext_b_c96_no_rotate_stage1

variant: b
width: 96
nsample: 32
num_points: 1024
use_normals: true

random_rotate: false
augment_strength: normal

epochs: 700
batch_size: 32
lr: 0.0008
weight_decay: 0.05
label_smoothing: 0.1

val_ratio: 0.15
num_workers: 8
seed: 42
use_gpu: true

use_class_weights: true
class_weight_power: 0.25

warmup_epochs: 20
early_stop_patience: 150
early_stop_min_delta: 0.0005
early_stop_metric: val_class_acc

resume_checkpoint: null

test_data_root: modelnet40_test_data/modelnet40_normal_resampled
test_split: test
checkpoint: runs/pointnext_b_c96_no_rotate_stage2/best.pt
out_csv: runs/pointnext_b_c96_no_rotate_stage2/赛道1-李文睿2023210965-王俊涛2023210952-孙奥翔2023210958.csv
votes: 1
predict_num_points: 2048
predict_batch_size: 24
eval_on_test: true
